<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 03 - Article Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #0d1b2a;
  font-family: 'Heebo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap {
  text-align: center;
  padding: 0 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 50px;
}
.exclusive {
  color: #d4a843;
  font-size: 42px;
  font-weight: 700;
  letter-spacing: 8px;
  text-transform: uppercase;
}
.gold-rule {
  width: 200px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #d4a843, transparent);
}
.headline {
  color: #fff;
  font-size: 76px;
  font-weight: 900;
  line-height: 1.4;
}
.source {
  color: rgba(255,255,255,0.55);
  font-size: 36px;
  font-weight: 300;
  letter-spacing: 2px;
}
.cta {
  color: #d4a843;
  font-size: 38px;
  font-weight: 700;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="exclusive">ראיון בלעדי</div>
  <div class="gold-rule"></div>
  <div class="headline">הבלוף של התעשייה נחשף</div>
  <div class="gold-rule"></div>
  <div class="source">עיתון Talk | סיוון תשפ״ו</div>
  <div class="cta">&#x1F446; הסיפור המלא בלינק</div>
</div>
</body>
</html>
