<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סטוריז להורדה | אמיתי לוי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#0d1b2a;color:#fff;min-height:100vh}
.header{text-align:center;padding:40px 20px 20px}
.header h1{font-size:28px;font-weight:900;color:#d4a843}
.header p{font-size:16px;color:rgba(255,255,255,.6);margin-top:8px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;padding:20px;max-width:1000px;margin:0 auto}
.card{background:#1a3a5c;border-radius:12px;overflow:hidden;text-align:center}
.card img{width:100%;aspect-ratio:9/16;object-fit:cover}
.card a{display:block;padding:14px;background:#d4a843;color:#fff;font-weight:700;font-size:16px;text-decoration:none;transition:background .2s}
.card a:hover{background:#c49a38}
.tip{text-align:center;padding:30px 20px;color:rgba(255,255,255,.5);font-size:14px;line-height:1.8}
</style>
</head>
<body>
<div class="header">

</div>
<div class="grid">

  <div class="card"><img src="images/story-04-quote1.png" alt="ציטוט 1"><a href="images/story-04-quote1.png" download>04 — ציטוט ⬇️</a></div>
  <div class="card"><img src="images/story-05-quote2.png" alt="ציטוט 2"><a href="images/story-05-quote2.png" download>05 — ציטוט ⬇️</a></div>
