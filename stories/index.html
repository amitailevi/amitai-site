<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d1b2a;
  font-family: 'Heebo', sans-serif;
  color: #fff;
  min-height: 100vh;
  padding: 60px 40px;
}
h1 {
  text-align: center;
  font-size: 42px;
  font-weight: 900;
  color: #d4a843;
  margin-bottom: 12px;
}
.sub {
  text-align: center;
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 50px;
}
.grid {
  max-width: 900px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
a {
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  background: #1a3a5c;
  color: #fff;
  text-decoration: none;
  padding: 32px 24px;
  border-radius: 16px;
  font-size: 22px;
  font-weight: 700;
  transition: background 0.2s, transform 0.2s;
  border: 2px solid transparent;
}
a:hover {
  background: #d4a843;
  color: #0d1b2a;
  transform: scale(1.03);
}
.num {
  display: inline-block;
  background: #d4a843;
  color: #0d1b2a;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  line-height: 36px;
  font-size: 16px;
  font-weight: 900;
  margin-left: 12px;
}
a:hover .num { background: #0d1b2a; color: #d4a843; }
.tip {
  text-align: center;
  margin-top: 50px;
  color: rgba(255,255,255,0.35);
  font-size: 16px;
  line-height: 1.8;
}
</style>
</head>
