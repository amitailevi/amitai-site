<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 09 - CTA</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #fff;
  font-family: 'Heebo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.pray { font-size: 100px; margin-bottom: 40px; }
.lines {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 60px;
}
.l1 { color: #0d1b2a; font-size: 56px; font-weight: 700; }
.l2 { color: #0d1b2a; font-size: 66px; font-weight: 700; }
.l3 { color: #0d1b2a; font-size: 76px; font-weight: 900; }
.btn {
  background: #d4a843;
  color: #fff;
  font-size: 46px;
  font-weight: 900;
  padding: 30px 100px;
  border-radius: 60px;
  letter-spacing: 2px;
  margin-top: 30px;
  box-shadow: 0 12px 40px rgba(212,168,67,0.35);
}
.tagline {
  color: #1a3a5c;
  font-size: 30px;
  font-weight: 400;
  margin-top: 30px;
  opacity: 0.7;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="pray">&#x1F64F;</div>
  <div class="lines">
    <div class="l1">תשתפו.</div>
    <div class="l2">תגיבו.</div>
    <div class="l3">תתייגו הורה שצריך לדעת.</div>
  </div>
  <div class="btn">amitailevi.com</div>
  <div class="tagline">מחזירים את החיוך לחינוך</div>
</div>
</body>
</html>
