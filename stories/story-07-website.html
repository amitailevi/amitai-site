<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 07 - Website Launch</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(180deg, #0d1b2a 0%, #1a3a5c 100%);
  font-family: 'Heebo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 55px;
  padding: 0 80px;
}
.fire {
  font-size: 48px;
  color: #fff;
  font-weight: 700;
}
.fire span { font-size: 52px; }
.frame {
  width: 700px;
  background: #fff;
  border-radius: 28px;
  border: 4px solid #d4a843;
  padding: 70px 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);
}
.frame-name {
  color: #0d1b2a;
  font-size: 56px;
  font-weight: 900;
}
.frame-slogan {
  color: #d4a843;
  font-size: 36px;
  font-weight: 700;
}
.url {
  color: #d4a843;
  font-size: 52px;
  font-weight: 900;
  text-decoration: underline;
  text-underline-offset: 12px;
  text-decoration-thickness: 3px;
}
.cta {
  color: rgba(255,255,255,0.7);
  font-size: 38px;
  font-weight: 400;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="fire">&#x1F525; השקנו אתר חדש</div>
  <div class="frame">
    <div class="frame-name">אמיתי לוי</div>
    <div class="frame-slogan">מחזירים את החיוך לחינוך</div>
  </div>
  <div class="url">amitailevi.com</div>
  <div class="cta">&#x1F446; לינק בביו</div>
</div>
</body>
</html>
