<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 04 - Quote 1</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #0d1b2a;
  font-family: 'Heebo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap {
  text-align: center;
  padding: 0 100px;
}
.quote-mark {
  color: #d4a843;
  font-size: 180px;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 30px;
  font-family: Georgia, serif;
}
.quote {
  color: #fff;
  font-size: 58px;
  font-weight: 700;
  line-height: 1.7;
  margin-bottom: 60px;
}
.separator {
  width: 140px;
  height: 3px;
  background: #d4a843;
  margin: 0 auto 50px;
}
.attribution {
  color: #d4a843;
  font-size: 34px;
  font-weight: 400;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="quote-mark">&#x201D;</div>
  <div class="quote">אני לא יושב במשרד ממוזג.<br>המשרד שלי הוא אשכולות הגנים.</div>
  <div class="separator"></div>
  <div class="attribution">— אמיתי לוי, עיתון Talk</div>
</div>
</body>
</html>
