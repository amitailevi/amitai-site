<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 02 - Hint</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: linear-gradient(170deg, #0d1b2a 0%, #1a3a5c 60%, #0d1b2a 100%);
  font-family: 'Heebo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap { text-align: center; padding: 0 100px; }
.line1 {
  color: rgba(255,255,255,0.75);
  font-size: 72px;
  font-weight: 700;
  margin-bottom: 50px;
}
.gold-line {
  width: 120px;
  height: 3px;
  background: #d4a843;
  margin: 0 auto 50px;
}
.line2 {
  color: #d4a843;
  font-size: 56px;
  font-weight: 700;
  line-height: 1.5;
}
.gold-line-bottom {
  width: 80px;
  height: 2px;
  background: #d4a843;
  margin: 60px auto 0;
  opacity: 0.5;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="line1">שנים בשטח.</div>
  <div class="gold-line"></div>
  <div class="line2">עכשיו הסיפור יוצא החוצה.</div>
  <div class="gold-line-bottom"></div>
</div>
</body>
</html>
