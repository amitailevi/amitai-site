<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 05 - Quote 2</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #fff;
  font-family: 'Heebo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap {
  text-align: center;
  padding: 0 90px;
}
.quote {
  color: #0d1b2a;
  font-size: 56px;
  font-weight: 700;
  line-height: 1.8;
  margin-bottom: 70px;
}
.gold-line {
  width: 160px;
  height: 4px;
  background: #d4a843;
  margin: 0 auto 50px;
}
.attribution {
  color: #d4a843;
  font-size: 34px;
  font-weight: 400;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="quote">כשסייעת שמחה — הילד שמח.<br>כשהיא עצובה — הילד עצוב.<br>לכן אצלנו הסייעת היא המלכה.</div>
  <div class="gold-line"></div>
  <div class="attribution">— אמיתי לוי</div>
</div>
</body>
</html>
