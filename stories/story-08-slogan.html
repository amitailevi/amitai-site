<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Story 08 - Slogan</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  background: #0d1b2a;
  font-family: 'Heebo', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.wrap { text-align: center; }
.deco-top, .deco-bottom {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}
.deco-top { margin-bottom: 60px; }
.deco-bottom { margin-top: 60px; }
.gold-line-left, .gold-line-right {
  width: 180px;
  height: 3px;
  background: linear-gradient(90deg, transparent, #d4a843);
}
.gold-line-right {
  background: linear-gradient(90deg, #d4a843, transparent);
}
.diamond {
  color: #d4a843;
  font-size: 18px;
}
.slogan {
  color: #d4a843;
  font-size: 120px;
  font-weight: 900;
  line-height: 1.4;
  letter-spacing: 2px;
}
.url {
  color: rgba(255,255,255,0.6);
  font-size: 34px;
  font-weight: 300;
  margin-top: 80px;
  letter-spacing: 3px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="deco-top">
    <div class="gold-line-left"></div>
    <div class="diamond">&#9670;</div>
    <div class="gold-line-right"></div>
  </div>
  <div class="slogan">מחזירים<br>את החיוך<br>לחינוך</div>
  <div class="deco-bottom">
    <div class="gold-line-left"></div>
    <div class="diamond">&#9670;</div>
    <div class="gold-line-right"></div>
  </div>
  <div class="url">amitailevi.com</div>
</div>
</body>
</html>
