<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#0d1b2a;color:#fff;min-height:100vh}
.top{text-align:center;padding:40px 20px 10px}
.top h1{font-size:32px;font-weight:900;color:#d4a843;letter-spacing:-.5px}
.top p{font-size:15px;color:rgba(255,255,255,.5);margin-top:8px}
.top .sub{display:inline-block;margin-top:12px;background:#1a3a5c;padding:6px 18px;border-radius:20px;font-size:13px;color:#d4a843}
.back{display:inline-block;margin-top:12px;color:#d4a843;text-decoration:none;font-size:14px;opacity:.6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;padding:20px;max-width:1200px;margin:0 auto}
.c{background:#1a3a5c;border-radius:14px;overflow:hidden;transition:transform .2s}
.c:hover{transform:translateY(-4px)}
.c img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.c-body{padding:14px 18px}
.c-body h3{font-size:17px;font-weight:700;color:#d4a843;margin-bottom:5px}
.c-body p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.c a.dl{display:block;padding:13px;background:#d4a843;color:#fff;font-weight:700;font-size:15px;text-decoration:none;text-align:center;transition:background .2s}
.c a.dl:hover{background:#c49a38}
.divider{max-width:800px;margin:40px auto 10px;border-top:1px solid rgba(212,168,67,.2);padding-top:10px}
.caps{max-width:800px;margin:0 auto 40px;padding:0 20px}
.caps h2{font-size:24px;font-weight:900;color:#d4a843;text-align:center;margin-bottom:24px}
.cap{background:#1a3a5c;border-radius:12px;padding:20px;margin-bottom:14px;border-right:3px solid #d4a843}
.cap h4{color:#d4a843;font-size:14px;margin-bottom:10px;font-weight:700}
.cap pre{white-space:pre-wrap;font-family:'Heebo',sans-serif;font-size:14px;color:rgba(255,255,255,.75);line-height:1.7;direction:rtl}
.cap .btns{display:flex;gap:8px;margin-top:12px}
.cap button{background:none;border:1px solid rgba(212,168,67,.4);color:#d4a843;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:12px;transition:all .2s}
.cap button:hover{background:#d4a843;color:#fff}
.cap button.ok{background:#27ae60;border-color:#27ae60;color:#fff}
.tip{text-align:center;padding:30px 20px 50px;color:rgba(255,255,255,.4);font-size:13px;line-height:2}
</style>
</head>
<body>
<div class="top">
  <h1>תיק תוכן — שבוע 1</h1>

  <div class="sub">V4 — נרטיב נשיאותי</div><br>
  <a href="/" class="back">← חזרה לאתר</a>
</div>
<div class="grid" id="g"></div>
<div class="divider"></div>
<div class="caps">
  <h2>טקסטים להעתקה</h2>

</div>
<div class="tip">בנייד: לחיצה ארוכה על התמונה → שמור תמונה<br>במחשב: כפתור הורדה</div>
<script>
const P=[
{n:"01",f:"01-shlichut.png",t:"שליחות",c:`מלבורן, אוסטרליה.

עמדתי מול ילדים יהודים בקצה העולם ולימדתי אותם מה זה להיות ישראלי.

ואז הבנתי: חינוך זו לא מקצוע.
חינוך זו שליחות.

🌐 amitailevi.com`},
{n:"02",f:"02-believe.png",t:"אני מאמין",c:`אני מאמין.

שחינוך הוא הכלי הכי חזק לשנות חברה.
שילד שמרגיש בטוח — ילמד הכל.
שמנהיגות נמדדת במה שעושים כשאף אחד לא מסתכל.

🌐 amitailevi.com`},
{n:"03",f:"03-mandate.png",t:"612 — הצבעת אמון",c:`קייטנת פסח. מועצה אזורית באר טוביה.

612 משפחות שבחרו.

לא בגלל פרסום. לא בגלל מחיר.
בגלל שהיינו בשטח. כל יום. שנה שלמה.

זו לא סטטיסטיקה.
זו הצבעת אמון.

🌐 amitailevi.com`},
{n:"04",f:"04-journey.png",t:"המסע של עשור",c:`מלבורן → באר טוביה.
המסע של עשור.

שליחות באוסטרליה.
מכרז ראשון ברעננה.
התרחבות לנס ציונה.
612 ילדים בבאר טוביה.

לא התחלתי גדול.
התחלתי עם אמונה.

🌐 amitailevi.com`},
{n:"05",f:"05-crisis.png",t:"ברגע אמת",c:`אפריל 2026. המלחמה בעיצומה.

הורים מקבלים הודעה:
״כל חיובי אפריל יבוטלו.״

לא חיכינו שיתלוננו. לא חיכינו להנחיה.
עשינו את הדבר הנכון.

כי מנהיגות נמדדת ברגעי אמת.

🌐 amitailevi.com`},
{n:"06",f:"06-quote.png",t:"לא המדרש אלא המעשה",c:`״לא המדרש הוא העיקר, אלא המעשה.״
— פרקי אבות א׳, י״ז

העיקרון שמנחה אותי כל יום.

הרבה מדברים על חינוך.

{n:"07",f:"07-feet.png",t:"חינוך דרך הרגליים",c:`חינוך עושים דרך הרגליים.

כותב דוחות צפייה. מלווה גננות.

יש מפעילים שנעלמים אחרי החוזה.
אני נשאר.

🌐 amitailevi.com`},
{n:"08",f:"08-chose-me.png",t:"הם בחרו בי",c:`הם בחרו בי.

🌐 amitailevi.com`},
{n:"09",f:"09-bridge.png",t:"ישראל — התפוצות",c:`ישראל — התפוצות.

למדתי ילדים יהודים באוסטרליה.

הקשר בין שני העולמות האלה הוא מה שמגדיר אותי.

כי ילד יהודי במלבורן וילד יהודי בבאר שבע

חינוך בלי גבולות.

🌐 amitailevi.com`},
{n:"10",f:"10-beginning.png",t:"וזו רק ההתחלה",c:`אתמול: שליח צעיר במלבורן.
היום: מערכת חינוך ב-4 ערים. מאות צוותים. אלפי ילדים.

וזו רק ההתחלה.

🌐 amitailevi.com`}
];
const g=document.getElementById('g'),cp=document.getElementById('cp');
P.forEach(p=>{
g.innerHTML+=`<div class="c"><img src="${p.f}" alt="${p.t}" loading="lazy"><div class="c-body"><h3>${p.n} — ${p.t}</h3><p>${p.c.split('\n')[0]}</p></div><a class="dl" href="${p.f}" download>${p.t} ⬇️</a></div>`;
cp.innerHTML+=`<div class="cap"><h4>${p.n} — ${p.t}</h4><pre>${p.c}</pre><div class="btns"><button onclick="cc(this,'${p.n}')">העתק טקסט</button></div></div>`;
});
function cc(b,n){
navigator.clipboard.writeText(P.find(p=>p.n===n).c).then(()=>{
b.textContent='✓ הועתק';b.classList.add('ok');
setTimeout(()=>{b.textContent='העתק טקסט';b.classList.remove('ok')},2000);
})}
</script>
</body>
</html>
