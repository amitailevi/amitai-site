<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תיק תוכן — טסט V5 | אמיתי לוי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4VY1G75TQE"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-4VY1G75TQE');</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#fff;color:#222;min-height:100vh}
.top{text-align:center;padding:40px 20px 10px}
.top h1{font-size:32px;font-weight:900;color:#222}
.top p{font-size:15px;color:#999;margin-top:8px}
.top .sub{display:inline-block;margin-top:12px;background:#f0be32;padding:6px 18px;border-radius:20px;font-size:13px;color:#fff;font-weight:700}
.back{display:inline-block;margin-top:12px;color:#f0be32;text-decoration:none;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;padding:20px;max-width:1100px;margin:0 auto}
.c{background:#fafafa;border-radius:14px;overflow:hidden;border:1px solid #eee;transition:transform .2s}
.c:hover{transform:translateY(-4px)}
.c img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.c-body{padding:14px 18px}
.c-body h3{font-size:17px;font-weight:700;color:#222;margin-bottom:5px}
.c-body p{font-size:13px;color:#999;line-height:1.5}
.c a.dl{display:block;padding:13px;background:#f0be32;color:#fff;font-weight:700;font-size:15px;text-decoration:none;text-align:center;transition:background .2s}
.c a.dl:hover{background:#d4a520}
.divider{max-width:800px;margin:40px auto 10px;border-top:1px solid #eee;padding-top:10px}
.caps{max-width:800px;margin:0 auto 40px;padding:0 20px}
.caps h2{font-size:24px;font-weight:900;color:#222;text-align:center;margin-bottom:24px}
.cap{background:#fafafa;border-radius:12px;padding:20px;margin-bottom:14px;border-right:3px solid #f0be32}
.cap h4{color:#f0be32;font-size:14px;margin-bottom:10px;font-weight:700}
.cap pre{white-space:pre-wrap;font-family:'Heebo',sans-serif;font-size:14px;color:#555;line-height:1.7;direction:rtl}
.cap button{background:none;border:1px solid #f0be32;color:#f0be32;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:12px;transition:all .2s;margin-top:12px}
.cap button:hover{background:#f0be32;color:#fff}
.cap button.ok{background:#27ae60;border-color:#27ae60;color:#fff}
.tip{text-align:center;padding:30px 20px 50px;color:#ccc;font-size:13px;line-height:2}
</style>
</head>
<body>
<div class="top">
  <h1>טסט — 3 פוסטים</h1>
  <p>לבן + צהוב | חז״ל + חינוך + שנינות</p>
  <div class="sub">V5 — בדיקת כיוון</div><br>
  <a href="/" class="back">← חזרה לאתר</a>
</div>
<div class="grid" id="g"></div>
<div class="divider"></div>
<div class="caps">
  <h2>טקסטים להעתקה</h2>
  <div id="cp"></div>
</div>
<div class="tip">בנייד: לחיצה ארוכה על התמונה → שמור תמונה<br>במחשב: כפתור הורדה</div>
<script>
const P=[
{n:"01",f:"test-01.png",t:"אם אין אני לי",c:`הלל הזקן אמר: ״אם אין אני לי, מי לי.״

אני אומר:
אם אתה לא בגן ב-7 בבוקר —
אל תקרא לעצמך מחנך.

אני שם. כל בוקר. כבר עשור.

אמיתי לוי
מחנך | יזם | שליח
🌐 amitailevi.com`},
{n:"02",f:"test-02.png",t:"612 = מצוות",c:`עובדה מעניינת:

612 ילדים נרשמו לקייטנת פסח.
מועצה אזורית באר טוביה.

רגע — 612?
זה גם מספר המצוות בתורה.
צירוף מקרים? 😏 גם אנחנו עושים את הכל.

אמיתי לוי
🌐 amitailevi.com`},
{n:"03",f:"test-03.png",t:"לא המדרש אלא המעשה",c:`״לא המדרש הוא העיקר, אלא המעשה.״
— פרקי אבות

בתרגום חופשי:
תפסיק לדבר. תיכנס לגן.

זה מה שאני עושה. כל בוקר. 🌅

אמיתי לוי
מחנך | יזם | שליח
🌐 amitailevi.com`}
];
const g=document.getElementById('g'),cp=document.getElementById('cp');
P.forEach(p=>{
g.innerHTML+=`<div class="c"><img src="${p.f}" alt="${p.t}" loading="lazy"><div class="c-body"><h3>${p.n} — ${p.t}</h3><p>${p.c.split('\n')[0]}</p></div><a class="dl" href="${p.f}" download>${p.t} ⬇️</a></div>`;
cp.innerHTML+=`<div class="cap"><h4>${p.n} — ${p.t}</h4><pre>${p.c}</pre><button onclick="cc(this,'${p.n}')">העתק טקסט</button></div>`;
});
function cc(b,n){
navigator.clipboard.writeText(P.find(p=>p.n===n).c).then(()=>{
b.textContent='✓ הועתק';b.classList.add('ok');
setTimeout(()=>{b.textContent='העתק טקסט';b.classList.remove('ok')},2000);
})}
</script>
</body>
</html>
